<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Prayer Registration — Rahma Islamic Centre</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Cinzel:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="registration-container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <div class="registration-card">
            <div class="card-header" style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-family: 'Cinzel', serif; color: var(--navy);">Eid Al-Fitr 2026</h1>
                <p style="color: var(--gold);">Friday, March 20, 2026</p>
            </div>

            <form id="eidForm">
                <div class="form-group" style="margin-bottom:24px;">
                    <label style="display:block;margin-bottom:10px;font-weight:500;font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);">Prayer Session <span style="color:var(--gold)">*</span></label>
                    <div class="session-picker" style="grid-template-columns: 1fr;">
                        <div class="session-card selected" id="sessionCard1">
                            <strong style="font-family:'Cinzel',serif;font-size:1rem;">Eid Prayer</strong>
                            <span style="display:block;font-size:0.85rem;color:var(--muted);margin-top:4px;">Takbeer 8:30 AM · Prayer 9:00 AM</span>
                        </div>
                    </div>
                    <input type="hidden" id="selectedSession" value="1">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" required placeholder="Enter first name">
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" required placeholder="Enter last name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Adults (12+)</label>
                        <input type="number" id="adults" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>Children (Under 12)</label>
                        <input type="number" id="children" value="0" min="0">
                    </div>
                </div>

                <div class="form-group" style="background: rgba(201,168,76,0.05); padding: 20px; border: 1px dashed var(--gold); border-radius: 4px; margin-top: 20px;">
                    <label style="font-family:'Cinzel',serif;font-size:0.75rem;color:var(--navy); margin-bottom:8px; display:block; text-transform: uppercase;">Support the Centre (Optional)</label>
                    <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 12px;">Your contribution helps cover event costs.</p>
                    <select id="donationAmount" style="width: 100%; padding: 10px;">
                        <option value="0">No donation at this time</option>
                        <option value="10">$10 — Sadaqah</option>
                        <option value="20">$20 — Family Support</option>
                        <option value="50">$50 — Community Sponsor</option>
                    </select>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; font-size: 0.85rem; cursor: pointer;">
                        <input type="checkbox" id="agreeTerms" required> I confirm my family will attend in person.
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit" style="width:100%; margin-top: 20px; padding: 15px; background: var(--navy); color: white; border: none; font-family: 'Cinzel', serif; cursor: pointer;">
                    Complete Registration
                </button>
            </form>
        </div>
    </main>

    <div class="success-overlay" id="successOverlay" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow-y: auto;">
        <div style="padding: 40px;">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: #27ae60; margin-bottom: 20px;"></i>
            <h2 style="font-family: 'Cinzel', serif;">Registration Confirmed!</h2>
            <p>Taqabbal Allahu minna wa minkum.</p>

            <div id="qrTicket" style="margin: 30px auto; padding: 20px; border: 2px solid var(--navy); border-radius: 12px; max-width: 320px; background: #fff;">
                <p style="font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold);">Official Entry Pass</p>
                <img id="displayQr" src="" style="width: 180px; height: 180px; margin: 15px 0;">
                <h4 id="qrName" style="margin: 10px 0 5px 0;"></h4>
                <p id="qrAttendees" style="font-size: 0.9rem; color: var(--muted);"></p>
                <div id="qrRefDisplay" style="font-family: monospace; background: #eee; padding: 5px; border-radius: 4px; display: inline-block; margin-top: 10px; font-weight: bold;"></div>
            </div>

            <p style="font-size: 0.8rem; max-width: 300px; margin: 0 auto 20px auto;">A confirmation email with your QR code has been sent. Please show this at the entrance.</p>
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="window.print()" style="padding: 10px 20px; cursor:pointer;">Print Ticket</button>
                <button onclick="location.reload()" style="padding: 10px 20px; background: var(--navy); color: white; border:none; cursor:pointer;">Register Another</button>
            </div>
        </div>
    </div>

    <script>
        const GS_URL = 'VOTRE_URL_GOOGLE_SCRIPT_ICI';

        function genRef() {
            return 'EID-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        }

        document.getElementById('eidForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            const ref = genRef();
            const record = {
                ref: ref,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                adults: document.getElementById('adults').value,
                children: document.getElementById('children').value,
                donationAmount: document.getElementById('donationAmount').value,
                session: "9:00 AM"
            };

            fetch(GS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(record)
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === 'success') {
                    // Remplissage du ticket
                    document.getElementById('displayQr').src = "https://chart.googleapis.com/chart?chs=180x180&cht=qr&chl=" + ref;
                    document.getElementById('qrName').textContent = record.firstName + " " + record.lastName;
                    document.getElementById('qrAttendees').textContent = (parseInt(record.adults) + parseInt(record.children)) + " Attendees";
                    document.getElementById('qrRefDisplay').textContent = ref;
                    
                    // Affichage de l'overlay
                    document.getElementById('successOverlay').style.display = 'flex';
                } else {
                    alert("Error: " + result.message);
                    btn.disabled = false;
                    btn.innerHTML = 'Complete Registration';
                }
            })
            .catch(err => {
                console.error(err);
                alert("Connection error. Please try again.");
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
